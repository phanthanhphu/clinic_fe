<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Opening ITSM...</title>
  <style>
    body { margin:0; min-height:100vh; display:grid; place-items:center; font-family:Arial, Helvetica, sans-serif; background:#f5f7fb; color:#10203f; }
    .box { width:min(520px, calc(100vw - 40px)); padding:28px; border-radius:18px; background:#fff; border:1px solid #e5e7eb; box-shadow:0 18px 44px rgba(15,29,53,.12); text-align:center; }
    .spinner { width:38px; height:38px; margin:0 auto 16px; border-radius:999px; border:4px solid #dbeafe; border-top-color:#2563eb; animation:spin .9s linear infinite; }
    h1 { margin:0 0 8px; font-size:20px; } p { margin:0; color:#667085; line-height:1.6; font-size:14px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="box"><div class="spinner"></div><h1>Opening ITSM...</h1><p>Please wait. If you are not logged in to GW2, you will be redirected to the login page first.</p></div>
  <script>
    (function(){
      var AFTER_LOGIN_ITSM_KEY="YO_AFTER_LOGIN_ITSM";
      var GW2_LOGIN_URL="/covicore/login.do";
      var ITSM_POST_URL="https://itsm.youngone.com/custom/youngone/index.do";
      var ITSM_SSO_PARAM_URL="/groupware/pnPortal/getItsmSloParam.do";
      function getLanguageCode(){try{if(window.Common&&typeof window.Common.getSession==="function"){var lang=window.Common.getSession("lang");if(lang)return String(lang).toUpperCase();}}catch(e){}return "EN";}
      function redirectToLogin(){try{sessionStorage.setItem(AFTER_LOGIN_ITSM_KEY,"Y");}catch(e){}window.location.replace(GW2_LOGIN_URL);}
      function submitItsm(jsonData){var form=document.createElement("form");form.method="POST";form.action=ITSM_POST_URL;form.target="_self";form.style.display="none";var params={olmI:jsonData&&jsonData.olml?jsonData.olml:"",companyCode:jsonData&&jsonData.companyCode?jsonData.companyCode:"",teamCode:jsonData&&jsonData.teamCode?jsonData.teamCode:"",langCode:getLanguageCode()};Object.keys(params).forEach(function(key){var input=document.createElement("input");input.type="hidden";input.name=key;input.value=params[key]||"";form.appendChild(input);});document.body.appendChild(form);form.submit();}
      function parseJsonSafely(text){try{return JSON.parse(text);}catch(e){return null;}}
      fetch(ITSM_SSO_PARAM_URL,{method:"POST",credentials:"same-origin",headers:{Accept:"application/json","X-Requested-With":"XMLHttpRequest"}}).then(function(response){return response.text().then(function(text){return{ok:response.ok,text:text};});}).then(function(result){var data=parseJsonSafely(result.text);if(!result.ok||!data){redirectToLogin();return;}if(data.status==="SUCCESS"&&data.jsonData){try{sessionStorage.removeItem(AFTER_LOGIN_ITSM_KEY);}catch(e){}submitItsm(data.jsonData);return;}redirectToLogin();}).catch(function(){redirectToLogin();});
    })();
  </script>
</body>
</html>
